name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_TARGET: ${{ matrix.target }}
          # 无开发者证书，跳过 macOS 代码签名
          APPLE_SIGNING_IDENTITY: "-"
        with:
          projectPath: apps/desktop
          tagName: v__VERSION__
          releaseName: Toka v__VERSION__
          releaseBody: |
            自动构建自 `main` @ ${{ github.sha }}

            ## 安装包

            | 平台 | 文件 |
            |------|------|
            | macOS (Apple Silicon) | `.dmg` / `.app.tar.gz`（`aarch64`） |
            | macOS (Intel) | `.dmg` / `.app.tar.gz`（`x86_64`） |
            | Windows | `.msi` / `.exe` |

            首次使用前请在应用内 **设置** 页配置滴答 Token 与 LLM API。

            > 安装包未做代码签名。macOS 首次打开需在 **系统设置 → 隐私与安全性** 中允许；Windows 可能弹出 SmartScreen 提示，选择「仍要运行」即可。
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
